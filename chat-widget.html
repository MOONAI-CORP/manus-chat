<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>iMessage Chat Widget — Demo</title>
  <style>
    /* ─── RESET & BASE ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* ─── DEMO STORE BACKGROUND ────────────────────────────────── */
    .demo-store {
      width: 100vw;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 12px;
      color: rgba(255,255,255,0.3);
      font-size: 14px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .demo-store h1 { font-size: 28px; color: rgba(255,255,255,0.12); font-weight: 700; letter-spacing: 0.1em; }

    /* ─── FLOATING LAUNCHER BUTTON ─────────────────────────────── */
    #imsg-launcher {
      position: fixed;
      bottom: 28px;
      right: 28px;
      width: 60px;
      height: 60px;
      border-radius: 50%;
      background: linear-gradient(145deg, #34c759, #30d158);
      box-shadow: 0 4px 24px rgba(52, 199, 89, 0.55), 0 2px 8px rgba(0,0,0,0.3);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 99998;
      border: none;
      outline: none;
      transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #imsg-launcher:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 32px rgba(52, 199, 89, 0.7), 0 2px 12px rgba(0,0,0,0.35);
    }
    #imsg-launcher:active { transform: scale(0.95); }
    #imsg-launcher svg { width: 30px; height: 30px; transition: opacity 0.2s; }
    #imsg-launcher .icon-chat { opacity: 1; position: absolute; }
    #imsg-launcher .icon-close { opacity: 0; position: absolute; transform: rotate(-90deg); transition: opacity 0.2s, transform 0.3s; }
    #imsg-launcher.open .icon-chat { opacity: 0; }
    #imsg-launcher.open .icon-close { opacity: 1; transform: rotate(0deg); }

    /* Notification badge */
    #imsg-launcher .badge {
      position: absolute;
      top: -2px;
      right: -2px;
      width: 20px;
      height: 20px;
      background: #ff3b30;
      border-radius: 50%;
      border: 2px solid #fff;
      font-size: 10px;
      font-weight: 700;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: pulse-badge 2s infinite;
    }
    @keyframes pulse-badge {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    /* ─── CHAT WINDOW ───────────────────────────────────────────── */
    #imsg-window {
      position: fixed;
      bottom: 102px;
      right: 28px;
      width: 370px;
      height: 580px;
      border-radius: 22px;
      overflow: hidden;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      box-shadow:
        0 32px 80px rgba(0,0,0,0.45),
        0 8px 24px rgba(0,0,0,0.3),
        0 0 0 0.5px rgba(255,255,255,0.1);
      transform: scale(0.85) translateY(30px);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s ease;
      transform-origin: bottom right;
    }
    #imsg-window.open {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    /* ─── HEADER ────────────────────────────────────────────────── */
    .imsg-header {
      background: rgba(28,28,30,0.96);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 12px;
      border-bottom: 0.5px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .imsg-avatar-wrap {
      position: relative;
      flex-shrink: 0;
    }
    .imsg-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: linear-gradient(135deg, #007aff, #34c759);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.5px;
      overflow: hidden;
    }
    .imsg-avatar img { width: 100%; height: 100%; object-fit: cover; }
    .imsg-online-dot {
      position: absolute;
      bottom: 1px;
      right: 1px;
      width: 11px;
      height: 11px;
      background: #34c759;
      border-radius: 50%;
      border: 2px solid rgba(28,28,30,0.96);
    }
    .imsg-header-info { flex: 1; min-width: 0; }
    .imsg-header-name {
      font-size: 15px;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .imsg-header-status {
      font-size: 12px;
      color: #34c759;
      margin-top: 1px;
    }
    .imsg-header-actions {
      display: flex;
      gap: 6px;
    }
    .imsg-header-btn {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.15s;
      color: #007aff;
    }
    .imsg-header-btn:hover { background: rgba(255,255,255,0.15); }
    .imsg-header-btn svg { width: 16px; height: 16px; }

    /* Brand selector tabs */
    .imsg-brand-tabs {
      background: rgba(28,28,30,0.92);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      padding: 8px 12px;
      gap: 6px;
      border-bottom: 0.5px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
      overflow-x: auto;
      scrollbar-width: none;
    }
    .imsg-brand-tabs::-webkit-scrollbar { display: none; }
    .imsg-brand-tab {
      flex-shrink: 0;
      padding: 5px 12px;
      border-radius: 20px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: rgba(255,255,255,0.5);
      transition: all 0.2s;
      white-space: nowrap;
    }
    .imsg-brand-tab.active {
      background: #007aff;
      border-color: #007aff;
      color: #fff;
    }
    .imsg-brand-tab:hover:not(.active) {
      background: rgba(255,255,255,0.08);
      color: rgba(255,255,255,0.8);
    }

    /* ─── MESSAGES AREA ─────────────────────────────────────────── */
    .imsg-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      background: #000;
      scroll-behavior: smooth;
    }
    .imsg-messages::-webkit-scrollbar { width: 3px; }
    .imsg-messages::-webkit-scrollbar-track { background: transparent; }
    .imsg-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* Date separator */
    .imsg-date-sep {
      text-align: center;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      margin: 10px 0 6px;
      font-weight: 500;
      letter-spacing: 0.02em;
    }

    /* Message row */
    .imsg-row {
      display: flex;
      flex-direction: column;
      max-width: 78%;
      animation: msg-in 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes msg-in {
      from { opacity: 0; transform: scale(0.85) translateY(8px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }
    .imsg-row.sent { align-self: flex-end; align-items: flex-end; }
    .imsg-row.recv { align-self: flex-start; align-items: flex-start; }

    /* Bubble */
    .imsg-bubble {
      padding: 10px 14px;
      border-radius: 20px;
      font-size: 15px;
      line-height: 1.45;
      word-break: break-word;
      position: relative;
      max-width: 100%;
    }
    /* Sent bubble — iMessage blue */
    .imsg-row.sent .imsg-bubble {
      background: #007aff;
      color: #fff;
      border-bottom-right-radius: 5px;
    }
    /* Received bubble — dark gray */
    .imsg-row.recv .imsg-bubble {
      background: #1c1c1e;
      color: #fff;
      border-bottom-left-radius: 5px;
    }
    /* Consecutive bubble rounding */
    .imsg-row.sent .imsg-bubble.top    { border-top-right-radius: 20px; border-bottom-right-radius: 5px; }
    .imsg-row.sent .imsg-bubble.mid    { border-top-right-radius: 5px;  border-bottom-right-radius: 5px; }
    .imsg-row.sent .imsg-bubble.bottom { border-top-right-radius: 5px;  border-bottom-right-radius: 20px; }
    .imsg-row.recv .imsg-bubble.top    { border-top-left-radius: 20px;  border-bottom-left-radius: 5px; }
    .imsg-row.recv .imsg-bubble.mid    { border-top-left-radius: 5px;   border-bottom-left-radius: 5px; }
    .imsg-row.recv .imsg-bubble.bottom { border-top-left-radius: 5px;   border-bottom-left-radius: 20px; }

    /* Timestamp */
    .imsg-ts {
      font-size: 10.5px;
      color: rgba(255,255,255,0.3);
      margin-top: 3px;
      padding: 0 4px;
    }
    .imsg-row.sent .imsg-ts { text-align: right; }

    /* Delivered / Read receipt */
    .imsg-receipt {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      text-align: right;
      padding: 0 4px;
      margin-top: 1px;
    }

    /* Quick reply chips */
    .imsg-quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      padding: 8px 14px 4px;
      background: #000;
      flex-shrink: 0;
    }
    .imsg-qr-chip {
      padding: 7px 14px;
      border-radius: 20px;
      border: 1px solid #007aff;
      color: #007aff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      background: transparent;
      transition: all 0.15s;
      white-space: nowrap;
    }
    .imsg-qr-chip:hover {
      background: #007aff;
      color: #fff;
    }

    /* ─── TYPING INDICATOR ──────────────────────────────────────── */
    .imsg-typing {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 10px 14px;
      background: #1c1c1e;
      border-radius: 20px;
      border-bottom-left-radius: 5px;
      width: fit-content;
      margin-top: 4px;
    }
    .imsg-typing span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.45);
      animation: typing-dot 1.4s infinite ease-in-out;
    }
    .imsg-typing span:nth-child(1) { animation-delay: 0s; }
    .imsg-typing span:nth-child(2) { animation-delay: 0.2s; }
    .imsg-typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing-dot {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.45; }
      30% { transform: translateY(-4px); opacity: 1; }
    }

    /* ─── INPUT BAR ─────────────────────────────────────────────── */
    .imsg-input-bar {
      background: rgba(28,28,30,0.98);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      padding: 10px 12px 14px;
      display: flex;
      align-items: flex-end;
      gap: 8px;
      border-top: 0.5px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .imsg-input-wrap {
      flex: 1;
      background: #1c1c1e;
      border-radius: 22px;
      border: 1px solid rgba(255,255,255,0.1);
      display: flex;
      align-items: flex-end;
      padding: 8px 14px;
      gap: 8px;
      transition: border-color 0.2s;
    }
    .imsg-input-wrap:focus-within {
      border-color: rgba(0,122,255,0.5);
    }
    .imsg-input {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
      resize: none;
      max-height: 100px;
      line-height: 1.4;
      min-height: 22px;
    }
    .imsg-input::placeholder { color: rgba(255,255,255,0.3); }
    .imsg-attach-btn {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      color: rgba(255,255,255,0.5);
      transition: background 0.15s;
    }
    .imsg-attach-btn:hover { background: rgba(255,255,255,0.15); }
    .imsg-attach-btn svg { width: 14px; height: 14px; }
    .imsg-send-btn {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #007aff;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: transform 0.15s, background 0.15s;
      box-shadow: 0 2px 10px rgba(0,122,255,0.4);
    }
    .imsg-send-btn:hover { transform: scale(1.08); background: #0a84ff; }
    .imsg-send-btn:active { transform: scale(0.93); }
    .imsg-send-btn svg { width: 16px; height: 16px; }
    .imsg-send-btn:disabled {
      background: rgba(255,255,255,0.1);
      box-shadow: none;
      cursor: default;
    }
    .imsg-send-btn:disabled svg { opacity: 0.3; }

    /* ─── PRODUCT CARD BUBBLE ───────────────────────────────────── */
    .imsg-product-card {
      background: #1c1c1e;
      border-radius: 16px;
      overflow: hidden;
      width: 220px;
      border: 0.5px solid rgba(255,255,255,0.1);
      cursor: pointer;
      transition: transform 0.15s;
    }
    .imsg-product-card:hover { transform: scale(1.02); }
    .imsg-product-img {
      width: 100%;
      height: 120px;
      object-fit: cover;
      background: linear-gradient(135deg, #1c1c1e, #2c2c2e);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
    }
    .imsg-product-body { padding: 10px 12px 12px; }
    .imsg-product-name { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 3px; }
    .imsg-product-price { font-size: 13px; color: #34c759; font-weight: 700; }
    .imsg-product-cta {
      display: block;
      margin-top: 8px;
      padding: 7px;
      background: #007aff;
      border-radius: 10px;
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      text-decoration: none;
    }

    /* ─── MOBILE RESPONSIVE ─────────────────────────────────────── */
    @media (max-width: 420px) {
      #imsg-window {
        right: 0;
        bottom: 0;
        width: 100vw;
        height: 100dvh;
        border-radius: 0;
        border-top-left-radius: 20px;
        border-top-right-radius: 20px;
      }
      #imsg-launcher { bottom: 20px; right: 20px; }
    }
  </style>
</head>
<body>

<!-- ─── DEMO STORE BACKDROP ─────────────────────────────────────── -->
<div class="demo-store">
  <h1>Your Shopify Store</h1>
  <p>Click the chat button →</p>
</div>

<!-- ─── FLOATING LAUNCHER ────────────────────────────────────────── -->
<button id="imsg-launcher" aria-label="Open chat" onclick="toggleChat()">
  <!-- Chat icon -->
  <svg class="icon-chat" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M14 2C7.373 2 2 6.925 2 13c0 2.21.72 4.26 1.95 5.96L2.5 22.5l4.04-1.3A12.07 12.07 0 0014 24c6.627 0 12-4.925 12-11S20.627 2 14 2z" fill="white"/>
  </svg>
  <!-- Close icon -->
  <svg class="icon-close" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M18 6L6 18M6 6l12 12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <span class="badge" id="imsg-badge">1</span>
</button>

<!-- ─── CHAT WINDOW ───────────────────────────────────────────────── -->
<div id="imsg-window" role="dialog" aria-label="Chat support">

  <!-- Header -->
  <div class="imsg-header">
    <div class="imsg-avatar-wrap">
      <div class="imsg-avatar" id="imsg-avatar-display">S</div>
      <div class="imsg-online-dot"></div>
    </div>
    <div class="imsg-header-info">
      <div class="imsg-header-name" id="imsg-agent-name">Support Team</div>
      <div class="imsg-header-status">● Active now</div>
    </div>
    <div class="imsg-header-actions">
      <button class="imsg-header-btn" title="Search" onclick="alert('Search conversation')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <circle cx="11" cy="11" r="7"/><path d="M21 21l-4.35-4.35"/>
        </svg>
      </button>
      <button class="imsg-header-btn" title="Minimize" onclick="toggleChat()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <path d="M5 12h14"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Brand selector tabs -->
  <div class="imsg-brand-tabs" id="imsg-brand-tabs">
    <button class="imsg-brand-tab active" onclick="switchBrand(this,'carbon')">Carbon Conceptz</button>
    <button class="imsg-brand-tab" onclick="switchBrand(this,'cozy')">Cozy Cloud Co</button>
    <button class="imsg-brand-tab" onclick="switchBrand(this,'armor')">Limited Armor</button>
    <button class="imsg-brand-tab" onclick="switchBrand(this,'bagify')">Bagify</button>
  </div>

  <!-- Messages -->
  <div class="imsg-messages" id="imsg-messages"></div>

  <!-- Quick replies -->
  <div class="imsg-quick-replies" id="imsg-quick-replies">
    <button class="imsg-qr-chip" onclick="sendQuick(this)">Track my order</button>
    <button class="imsg-qr-chip" onclick="sendQuick(this)">Return policy</button>
    <button class="imsg-qr-chip" onclick="sendQuick(this)">Product info</button>
    <button class="imsg-qr-chip" onclick="sendQuick(this)">Talk to a human</button>
  </div>

  <!-- Input bar -->
  <div class="imsg-input-bar">
    <div class="imsg-input-wrap">
      <button class="imsg-attach-btn" title="Attach" onclick="alert('Attach file')">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <textarea
        id="imsg-input"
        class="imsg-input"
        placeholder="iMessage"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this); toggleSendBtn()"
      ></textarea>
    </div>
    <button class="imsg-send-btn" id="imsg-send-btn" onclick="sendMessage()" disabled>
      <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 4l8 8-8 8M4 12h16" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      </svg>
    </button>
  </div>

</div>

<!-- ─── SCRIPT ────────────────────────────────────────────────────── -->
<script>
/* ── CONFIG ──────────────────────────────────────────────────────── */
const BRANDS = {
  carbon: {
    name: 'Carbon Conceptz',
    avatar: 'CC',
    color: '#007aff',
    accentColor: '#0a84ff',
    greeting: "Hey! 👋 Welcome to Carbon Conceptz. I'm here to help with your carbon fiber phone cases & auto accessories. What can I help you with?",
    quickReplies: ['Track my order', 'Carbon fiber cases', 'Automotive accessories', 'Return policy'],
    product: { name: 'Carbon Fiber iPhone 16 Case', price: '$34.99', emoji: '📱' }
  },
  cozy: {
    name: 'Cozy Cloud Co',
    avatar: 'CZ',
    color: '#5e5ce6',
    accentColor: '#6e6cf6',
    greeting: "Hi there! ☁️ Welcome to Cozy Cloud Co. Discover our monofloral bedding & luxury bamboo textiles. How can I help?",
    quickReplies: ['Track my order', 'Monofloral bedding', 'Bamboo collection', 'Size guide'],
    product: { name: 'Monofloral Duvet Set', price: '$89.99', emoji: '🛏️' }
  },
  armor: {
    name: 'Limited Armor',
    avatar: 'LA',
    color: '#ff9f0a',
    accentColor: '#ffb340',
    greeting: "Welcome to Limited Armor 🛡️ — premium designer iPhone cases. You've got great taste. What can I help you find?",
    quickReplies: ['Track my order', 'Designer cases', 'Limited drops', 'Custom engraving'],
    product: { name: 'Designer iPhone 16 Pro Case', price: '$79.99', emoji: '🛡️' }
  },
  bagify: {
    name: 'Bagify',
    avatar: 'BG',
    color: '#ff375f',
    accentColor: '#ff6b81',
    greeting: "Hey! 👜 Welcome to Bagify — premium crossbody bags. We just launched! What can I help you with?",
    quickReplies: ['New arrivals', 'Track my order', 'Bag materials', 'Shipping info'],
    product: { name: 'Premium Crossbody Bag', price: '$59.99', emoji: '👜' }
  }
};

let currentBrand = 'carbon';
let isOpen = false;
let typingTimer = null;
let messageCount = 0;

/* ── TOGGLE CHAT ─────────────────────────────────────────────────── */
function toggleChat() {
  const win = document.getElementById('imsg-window');
  const btn = document.getElementById('imsg-launcher');
  const badge = document.getElementById('imsg-badge');
  isOpen = !isOpen;
  win.classList.toggle('open', isOpen);
  btn.classList.toggle('open', isOpen);
  if (isOpen) {
    badge.style.display = 'none';
    if (messageCount === 0) {
      setTimeout(() => showWelcome(), 300);
    }
    setTimeout(() => document.getElementById('imsg-input').focus(), 400);
  }
}

/* ── SHOW WELCOME ────────────────────────────────────────────────── */
function showWelcome() {
  const brand = BRANDS[currentBrand];
  clearMessages();
  addDateSep('Today');
  showTyping(() => {
    addMessage(brand.greeting, 'recv');
    setTimeout(() => {
      addProductCard(brand.product);
    }, 600);
    updateQuickReplies(brand.quickReplies);
  });
}

/* ── SWITCH BRAND ────────────────────────────────────────────────── */
function switchBrand(el, brandKey) {
  document.querySelectorAll('.imsg-brand-tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentBrand = brandKey;
  const brand = BRANDS[brandKey];

  // Update accent color
  document.documentElement.style.setProperty('--brand-color', brand.color);
  document.querySelector('#imsg-launcher').style.background = `linear-gradient(145deg, ${brand.color}, ${brand.accentColor})`;
  document.querySelector('#imsg-launcher').style.boxShadow = `0 4px 24px ${brand.color}88, 0 2px 8px rgba(0,0,0,0.3)`;
  document.querySelector('.imsg-send-btn').style.background = brand.color;
  document.querySelector('.imsg-send-btn').style.boxShadow = `0 2px 10px ${brand.color}66`;

  // Update header
  document.getElementById('imsg-agent-name').textContent = brand.name;
  const av = document.getElementById('imsg-avatar-display');
  av.textContent = brand.avatar;
  av.style.background = `linear-gradient(135deg, ${brand.color}, ${brand.accentColor})`;

  // Update quick replies
  updateQuickReplies(brand.quickReplies);

  // Reset messages
  messageCount = 0;
  clearMessages();
  setTimeout(() => showWelcome(), 200);
}

/* ── MESSAGES ────────────────────────────────────────────────────── */
function clearMessages() {
  const el = document.getElementById('imsg-messages');
  el.innerHTML = '';
}

function addDateSep(text) {
  const el = document.getElementById('imsg-messages');
  const sep = document.createElement('div');
  sep.className = 'imsg-date-sep';
  sep.textContent = text;
  el.appendChild(sep);
}

function addMessage(text, type, showTs = true) {
  const el = document.getElementById('imsg-messages');
  const row = document.createElement('div');
  row.className = `imsg-row ${type}`;
  messageCount++;

  const bubble = document.createElement('div');
  bubble.className = 'imsg-bubble';
  bubble.textContent = text;
  row.appendChild(bubble);

  if (showTs) {
    const ts = document.createElement('div');
    ts.className = 'imsg-ts';
    ts.textContent = getTime();
    row.appendChild(ts);
  }

  if (type === 'sent') {
    const receipt = document.createElement('div');
    receipt.className = 'imsg-receipt';
    receipt.textContent = 'Delivered';
    row.appendChild(receipt);
    setTimeout(() => { receipt.textContent = 'Read'; }, 2000);
  }

  el.appendChild(row);
  scrollToBottom();
}

function addProductCard(product) {
  const el = document.getElementById('imsg-messages');
  const row = document.createElement('div');
  row.className = 'imsg-row recv';

  const card = document.createElement('div');
  card.className = 'imsg-product-card';
  card.innerHTML = `
    <div class="imsg-product-img">${product.emoji}</div>
    <div class="imsg-product-body">
      <div class="imsg-product-name">${product.name}</div>
      <div class="imsg-product-price">${product.price}</div>
      <a href="#" class="imsg-product-cta">View Product →</a>
    </div>
  `;
  row.appendChild(card);
  el.appendChild(row);
  scrollToBottom();
}

function showTyping(callback, delay = 1400) {
  const el = document.getElementById('imsg-messages');
  const row = document.createElement('div');
  row.className = 'imsg-row recv';
  row.id = 'imsg-typing-row';

  const indicator = document.createElement('div');
  indicator.className = 'imsg-typing';
  indicator.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(indicator);
  el.appendChild(row);
  scrollToBottom();

  typingTimer = setTimeout(() => {
    const typingRow = document.getElementById('imsg-typing-row');
    if (typingRow) typingRow.remove();
    callback();
  }, delay);
}

/* ── SEND MESSAGE ────────────────────────────────────────────────── */
function sendMessage() {
  const input = document.getElementById('imsg-input');
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, 'sent');
  input.value = '';
  autoResize(input);
  toggleSendBtn();

  // Simulate bot reply
  const replies = getBotReply(text.toLowerCase());
  showTyping(() => {
    addMessage(replies, 'recv');
  }, 1200 + Math.random() * 600);
}

function sendQuick(el) {
  const text = el.textContent;
  addMessage(text, 'sent');
  const replies = getBotReply(text.toLowerCase());
  showTyping(() => {
    addMessage(replies, 'recv');
  }, 1000 + Math.random() * 500);
}

function getBotReply(text) {
  if (text.includes('track') || text.includes('order')) {
    return "Sure! Please share your order number and I'll look that up for you right away. 📦";
  } else if (text.includes('return') || text.includes('refund')) {
    return "We have a 30-day hassle-free return policy. Just reply with your order number and reason and we'll take care of you! 🙌";
  } else if (text.includes('human') || text.includes('agent') || text.includes('person')) {
    return "Connecting you to a live agent now... Typical wait time is under 2 minutes. ⏱️";
  } else if (text.includes('ship') || text.includes('delivery')) {
    return "We ship within 1-2 business days. Standard delivery is 5-7 days, Express is 2-3 days. Free shipping on orders over $50! 🚚";
  } else if (text.includes('price') || text.includes('discount') || text.includes('promo')) {
    return "Use code WELCOME10 for 10% off your first order! 🎉 Check our sale section for more deals.";
  } else if (text.includes('size') || text.includes('fit')) {
    return "Check our size guide on the product page. If you're between sizes, we recommend sizing up. Any specific product I can help with?";
  } else {
    const fallbacks = [
      "Great question! Let me check that for you. One moment... 🔍",
      "Thanks for reaching out! Our team will get back to you within a few minutes. 💬",
      "I'm on it! Is there anything else I can help you with in the meantime?",
    ];
    return fallbacks[Math.floor(Math.random() * fallbacks.length)];
  }
}

/* ── QUICK REPLIES ───────────────────────────────────────────────── */
function updateQuickReplies(replies) {
  const el = document.getElementById('imsg-quick-replies');
  el.innerHTML = replies.map(r =>
    `<button class="imsg-qr-chip" onclick="sendQuick(this)">${r}</button>`
  ).join('');
}

/* ── UTILITIES ───────────────────────────────────────────────────── */
function scrollToBottom() {
  const el = document.getElementById('imsg-messages');
  requestAnimationFrame(() => { el.scrollTop = el.scrollHeight; });
}

function getTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function toggleSendBtn() {
  const btn = document.getElementById('imsg-send-btn');
  const val = document.getElementById('imsg-input').value.trim();
  btn.disabled = !val;
}

/* ── INIT ────────────────────────────────────────────────────────── */
// Apply initial brand color
(function init() {
  const brand = BRANDS[currentBrand];
  document.querySelector('#imsg-launcher').style.background = `linear-gradient(145deg, ${brand.color}, ${brand.accentColor})`;
  document.querySelector('#imsg-launcher').style.boxShadow = `0 4px 24px ${brand.color}88, 0 2px 8px rgba(0,0,0,0.3)`;
  document.getElementById('imsg-avatar-display').style.background = `linear-gradient(135deg, ${brand.color}, ${brand.accentColor})`;
})();
</script>
</body>
</html>
