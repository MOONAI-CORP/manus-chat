<!-- ═══════════════════════════════════════════════════════════════
     iMessage Chat Widget — Shopify Embed Snippet
     Paste this entire block into your Shopify theme.liquid
     just before the closing </body> tag.
     ═══════════════════════════════════════════════════════════════ -->

<style>
/* ─── iMessage Chat Widget Styles ─────────────────────────────── */
#imsg-launcher {
  position: fixed;
  bottom: 28px;
  right: 28px;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  background: linear-gradient(145deg, #34c759, #30d158);
  box-shadow: 0 4px 24px rgba(52,199,89,0.55), 0 2px 8px rgba(0,0,0,0.3);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 99998;
  border: none;
  outline: none;
  transition: transform 0.2s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.2s ease;
  -webkit-tap-highlight-color: transparent;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
}
#imsg-launcher:hover { transform: scale(1.08); }
#imsg-launcher:active { transform: scale(0.95); }
#imsg-launcher svg { width: 30px; height: 30px; transition: opacity 0.2s; }
#imsg-launcher .imsg-icon-chat { opacity: 1; position: absolute; }
#imsg-launcher .imsg-icon-close { opacity: 0; position: absolute; transform: rotate(-90deg); transition: opacity 0.2s, transform 0.3s; }
#imsg-launcher.imsg-open .imsg-icon-chat { opacity: 0; }
#imsg-launcher.imsg-open .imsg-icon-close { opacity: 1; transform: rotate(0deg); }
#imsg-launcher .imsg-badge {
  position: absolute; top: -2px; right: -2px;
  width: 20px; height: 20px;
  background: #ff3b30; border-radius: 50%; border: 2px solid #fff;
  font-size: 10px; font-weight: 700; color: #fff;
  display: flex; align-items: center; justify-content: center;
  animation: imsg-pulse 2s infinite;
}
@keyframes imsg-pulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.15)} }

#imsg-window {
  position: fixed;
  bottom: 102px; right: 28px;
  width: 370px; height: 580px;
  border-radius: 22px; overflow: hidden;
  z-index: 99999;
  display: flex; flex-direction: column;
  box-shadow: 0 32px 80px rgba(0,0,0,0.45), 0 8px 24px rgba(0,0,0,0.3), 0 0 0 0.5px rgba(255,255,255,0.1);
  transform: scale(0.85) translateY(30px); opacity: 0; pointer-events: none;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1), opacity 0.25s ease;
  transform-origin: bottom right;
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif;
}
#imsg-window.imsg-open { transform: scale(1) translateY(0); opacity: 1; pointer-events: all; }

.imsg-header {
  background: rgba(28,28,30,0.96);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  padding: 14px 16px 12px;
  display: flex; align-items: center; gap: 12px;
  border-bottom: 0.5px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}
.imsg-avatar-wrap { position: relative; flex-shrink: 0; }
.imsg-avatar {
  width: 42px; height: 42px; border-radius: 50%;
  background: linear-gradient(135deg, #007aff, #34c759);
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; font-weight: 700; color: #fff; letter-spacing: -0.5px;
}
.imsg-online-dot {
  position: absolute; bottom: 1px; right: 1px;
  width: 11px; height: 11px;
  background: #34c759; border-radius: 50%; border: 2px solid rgba(28,28,30,0.96);
}
.imsg-header-info { flex: 1; min-width: 0; }
.imsg-header-name { font-size: 15px; font-weight: 600; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.imsg-header-status { font-size: 12px; color: #34c759; margin-top: 1px; }
.imsg-header-actions { display: flex; gap: 6px; }
.imsg-header-btn {
  width: 32px; height: 32px; border-radius: 50%;
  background: rgba(255,255,255,0.08); border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: background 0.15s; color: #007aff;
}
.imsg-header-btn:hover { background: rgba(255,255,255,0.15); }
.imsg-header-btn svg { width: 16px; height: 16px; }

.imsg-messages {
  flex: 1; overflow-y: auto;
  padding: 16px 14px;
  display: flex; flex-direction: column; gap: 4px;
  background: #000; scroll-behavior: smooth;
}
.imsg-messages::-webkit-scrollbar { width: 3px; }
.imsg-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

.imsg-date-sep {
  text-align: center; font-size: 11px;
  color: rgba(255,255,255,0.35); margin: 10px 0 6px;
  font-weight: 500; letter-spacing: 0.02em;
}
.imsg-row {
  display: flex; flex-direction: column; max-width: 78%;
  animation: imsg-msg-in 0.3s cubic-bezier(0.34,1.56,0.64,1) both;
}
@keyframes imsg-msg-in {
  from { opacity:0; transform:scale(0.85) translateY(8px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}
.imsg-row.imsg-sent { align-self: flex-end; align-items: flex-end; }
.imsg-row.imsg-recv { align-self: flex-start; align-items: flex-start; }
.imsg-bubble {
  padding: 10px 14px; border-radius: 20px;
  font-size: 15px; line-height: 1.45; word-break: break-word;
}
.imsg-row.imsg-sent .imsg-bubble { background: #007aff; color: #fff; border-bottom-right-radius: 5px; }
.imsg-row.imsg-recv .imsg-bubble { background: #1c1c1e; color: #fff; border-bottom-left-radius: 5px; }
.imsg-ts { font-size: 10.5px; color: rgba(255,255,255,0.3); margin-top: 3px; padding: 0 4px; }
.imsg-row.imsg-sent .imsg-ts { text-align: right; }
.imsg-receipt { font-size: 10px; color: rgba(255,255,255,0.3); text-align: right; padding: 0 4px; margin-top: 1px; }

.imsg-typing {
  display: flex; align-items: center; gap: 4px;
  padding: 10px 14px; background: #1c1c1e;
  border-radius: 20px; border-bottom-left-radius: 5px;
  width: fit-content; margin-top: 4px;
}
.imsg-typing span {
  width: 7px; height: 7px; border-radius: 50%;
  background: rgba(255,255,255,0.45);
  animation: imsg-dot 1.4s infinite ease-in-out;
}
.imsg-typing span:nth-child(1){animation-delay:0s}
.imsg-typing span:nth-child(2){animation-delay:0.2s}
.imsg-typing span:nth-child(3){animation-delay:0.4s}
@keyframes imsg-dot {
  0%,60%,100%{transform:translateY(0);opacity:.45}
  30%{transform:translateY(-4px);opacity:1}
}

.imsg-quick-replies {
  display: flex; flex-wrap: wrap; gap: 7px;
  padding: 8px 14px 4px; background: #000;
  flex-shrink: 0; overflow-x: auto; scrollbar-width: none;
}
.imsg-quick-replies::-webkit-scrollbar { display: none; }
.imsg-qr-chip {
  flex-shrink: 0; padding: 7px 14px; border-radius: 20px;
  border: 1px solid #007aff; color: #007aff;
  font-size: 13px; font-weight: 500; cursor: pointer;
  background: transparent; transition: all 0.15s; white-space: nowrap;
  font-family: inherit;
}
.imsg-qr-chip:hover { background: #007aff; color: #fff; }

.imsg-input-bar {
  background: rgba(28,28,30,0.98);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  padding: 10px 12px 14px;
  display: flex; align-items: flex-end; gap: 8px;
  border-top: 0.5px solid rgba(255,255,255,0.08);
  flex-shrink: 0;
}
.imsg-input-wrap {
  flex: 1; background: #1c1c1e; border-radius: 22px;
  border: 1px solid rgba(255,255,255,0.1);
  display: flex; align-items: flex-end;
  padding: 8px 14px; gap: 8px; transition: border-color 0.2s;
}
.imsg-input-wrap:focus-within { border-color: rgba(0,122,255,0.5); }
.imsg-input {
  flex: 1; background: transparent; border: none; outline: none;
  color: #fff; font-size: 15px; font-family: inherit;
  resize: none; max-height: 100px; line-height: 1.4; min-height: 22px;
}
.imsg-input::placeholder { color: rgba(255,255,255,0.3); }
.imsg-send-btn {
  width: 36px; height: 36px; border-radius: 50%;
  background: #007aff; border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: transform 0.15s, background 0.15s;
  box-shadow: 0 2px 10px rgba(0,122,255,0.4);
}
.imsg-send-btn:hover { transform: scale(1.08); background: #0a84ff; }
.imsg-send-btn:active { transform: scale(0.93); }
.imsg-send-btn:disabled { background: rgba(255,255,255,0.1); box-shadow: none; cursor: default; }
.imsg-send-btn:disabled svg { opacity: 0.3; }

.imsg-product-card {
  background: #1c1c1e; border-radius: 16px; overflow: hidden;
  width: 220px; border: 0.5px solid rgba(255,255,255,0.1);
  cursor: pointer; transition: transform 0.15s;
}
.imsg-product-card:hover { transform: scale(1.02); }
.imsg-product-img {
  width: 100%; height: 120px; object-fit: cover;
  background: linear-gradient(135deg, #1c1c1e, #2c2c2e);
  display: flex; align-items: center; justify-content: center; font-size: 36px;
}
.imsg-product-body { padding: 10px 12px 12px; }
.imsg-product-name { font-size: 13px; font-weight: 600; color: #fff; margin-bottom: 3px; }
.imsg-product-price { font-size: 13px; color: #34c759; font-weight: 700; }
.imsg-product-cta {
  display: block; margin-top: 8px; padding: 7px;
  background: #007aff; border-radius: 10px;
  text-align: center; font-size: 12px; font-weight: 600;
  color: #fff; text-decoration: none;
}

@media (max-width: 420px) {
  #imsg-window {
    right: 0; bottom: 0; width: 100vw; height: 100dvh;
    border-radius: 0; border-top-left-radius: 20px; border-top-right-radius: 20px;
  }
  #imsg-launcher { bottom: 20px; right: 20px; }
}
</style>

<!-- ─── Launcher Button ──────────────────────────────────────────── -->
<button id="imsg-launcher" aria-label="Open chat" onclick="imsgToggle()">
  <svg class="imsg-icon-chat" viewBox="0 0 28 28" fill="none">
    <path d="M14 2C7.373 2 2 6.925 2 13c0 2.21.72 4.26 1.95 5.96L2.5 22.5l4.04-1.3A12.07 12.07 0 0014 24c6.627 0 12-4.925 12-11S20.627 2 14 2z" fill="white"/>
  </svg>
  <svg class="imsg-icon-close" viewBox="0 0 24 24" fill="none">
    <path d="M18 6L6 18M6 6l12 12" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </svg>
  <span class="imsg-badge" id="imsg-badge">1</span>
</button>

<!-- ─── Chat Window ──────────────────────────────────────────────── -->
<div id="imsg-window" role="dialog" aria-label="Chat support">
  <div class="imsg-header">
    <div class="imsg-avatar-wrap">
      <div class="imsg-avatar" id="imsg-av">S</div>
      <div class="imsg-online-dot"></div>
    </div>
    <div class="imsg-header-info">
      <div class="imsg-header-name" id="imsg-hname">Support Team</div>
      <div class="imsg-header-status">● Active now</div>
    </div>
    <div class="imsg-header-actions">
      <button class="imsg-header-btn" onclick="imsgToggle()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/></svg>
      </button>
    </div>
  </div>
  <div class="imsg-messages" id="imsg-msgs"></div>
  <div class="imsg-quick-replies" id="imsg-qrs"></div>
  <div class="imsg-input-bar">
    <div class="imsg-input-wrap">
      <textarea id="imsg-inp" class="imsg-input" placeholder="iMessage" rows="1"
        onkeydown="imsgKey(event)" oninput="imsgResize(this);imsgToggleBtn()"></textarea>
    </div>
    <button class="imsg-send-btn" id="imsg-sbtn" onclick="imsgSend()" disabled>
      <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 4l8 8-8 8M4 12h16"/>
      </svg>
    </button>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════════
   iMessage Chat Widget — Configuration
   ════════════════════════════════════════════════════════════════
   CUSTOMIZE THESE VALUES FOR YOUR STORE:
*/
var IMSG_CONFIG = {
  agentName: "Support Team",           // ← Change to your store name
  agentAvatar: "S",                    // ← 1-2 letter initials
  brandColor: "#007aff",               // ← Your brand color (hex)
  accentColor: "#0a84ff",              // ← Slightly lighter shade
  greeting: "Hey! 👋 Welcome! How can I help you today?",
  quickReplies: ["Track my order", "Return policy", "Product info", "Talk to a human"],
  featuredProduct: {
    name: "Featured Product",          // ← Product name
    price: "$29.99",                   // ← Price
    emoji: "🛍️",                       // ← Emoji or replace with img src
    url: "/products/your-product"      // ← Shopify product URL
  }
};
/* ════════════════════════════════════════════════════════════════ */

var imsgOpen = false;
var imsgMsgCount = 0;

function imsgToggle() {
  var win = document.getElementById('imsg-window');
  var btn = document.getElementById('imsg-launcher');
  var badge = document.getElementById('imsg-badge');
  imsgOpen = !imsgOpen;
  win.classList.toggle('imsg-open', imsgOpen);
  btn.classList.toggle('imsg-open', imsgOpen);
  if (imsgOpen) {
    badge.style.display = 'none';
    if (imsgMsgCount === 0) setTimeout(imsgWelcome, 300);
    setTimeout(function(){ document.getElementById('imsg-inp').focus(); }, 400);
  }
}

function imsgWelcome() {
  imsgClear();
  imsgDateSep('Today');
  imsgTyping(function() {
    imsgAddMsg(IMSG_CONFIG.greeting, 'recv');
    if (IMSG_CONFIG.featuredProduct) {
      setTimeout(function(){ imsgProductCard(IMSG_CONFIG.featuredProduct); }, 600);
    }
    imsgSetQRs(IMSG_CONFIG.quickReplies);
  }, 1400);
}

function imsgClear() {
  document.getElementById('imsg-msgs').innerHTML = '';
  imsgMsgCount = 0;
}

function imsgDateSep(t) {
  var el = document.getElementById('imsg-msgs');
  var d = document.createElement('div');
  d.className = 'imsg-date-sep';
  d.textContent = t;
  el.appendChild(d);
}

function imsgAddMsg(text, type) {
  var el = document.getElementById('imsg-msgs');
  var row = document.createElement('div');
  row.className = 'imsg-row imsg-' + type;
  imsgMsgCount++;
  var bub = document.createElement('div');
  bub.className = 'imsg-bubble';
  bub.textContent = text;
  row.appendChild(bub);
  var ts = document.createElement('div');
  ts.className = 'imsg-ts';
  ts.textContent = imsgTime();
  row.appendChild(ts);
  if (type === 'sent') {
    var rec = document.createElement('div');
    rec.className = 'imsg-receipt';
    rec.textContent = 'Delivered';
    row.appendChild(rec);
    setTimeout(function(){ rec.textContent = 'Read'; }, 2000);
  }
  el.appendChild(row);
  imsgScroll();
}

function imsgProductCard(p) {
  var el = document.getElementById('imsg-msgs');
  var row = document.createElement('div');
  row.className = 'imsg-row imsg-recv';
  var card = document.createElement('div');
  card.className = 'imsg-product-card';
  card.innerHTML =
    '<div class="imsg-product-img">' + p.emoji + '</div>' +
    '<div class="imsg-product-body">' +
      '<div class="imsg-product-name">' + p.name + '</div>' +
      '<div class="imsg-product-price">' + p.price + '</div>' +
      '<a href="' + p.url + '" class="imsg-product-cta">View Product →</a>' +
    '</div>';
  row.appendChild(card);
  el.appendChild(row);
  imsgScroll();
}

function imsgTyping(cb, delay) {
  var el = document.getElementById('imsg-msgs');
  var row = document.createElement('div');
  row.className = 'imsg-row imsg-recv';
  row.id = 'imsg-typing-row';
  var ind = document.createElement('div');
  ind.className = 'imsg-typing';
  ind.innerHTML = '<span></span><span></span><span></span>';
  row.appendChild(ind);
  el.appendChild(row);
  imsgScroll();
  setTimeout(function() {
    var tr = document.getElementById('imsg-typing-row');
    if (tr) tr.remove();
    cb();
  }, delay || 1400);
}

function imsgSetQRs(replies) {
  var el = document.getElementById('imsg-qrs');
  el.innerHTML = replies.map(function(r) {
    return '<button class="imsg-qr-chip" onclick="imsgQuick(this)">' + r + '</button>';
  }).join('');
}

function imsgSend() {
  var inp = document.getElementById('imsg-inp');
  var text = inp.value.trim();
  if (!text) return;
  imsgAddMsg(text, 'sent');
  inp.value = '';
  imsgResize(inp);
  imsgToggleBtn();
  var reply = imsgBotReply(text.toLowerCase());
  imsgTyping(function(){ imsgAddMsg(reply, 'recv'); }, 1100 + Math.random() * 600);
}

function imsgQuick(el) {
  var text = el.textContent;
  imsgAddMsg(text, 'sent');
  var reply = imsgBotReply(text.toLowerCase());
  imsgTyping(function(){ imsgAddMsg(reply, 'recv'); }, 1000 + Math.random() * 500);
}

function imsgBotReply(t) {
  if (t.includes('track') || t.includes('order')) return "Please share your order number and I'll look that up right away! 📦";
  if (t.includes('return') || t.includes('refund')) return "We have a 30-day hassle-free return policy. Share your order number and we'll take care of you! 🙌";
  if (t.includes('human') || t.includes('agent')) return "Connecting you to a live agent now... Typical wait is under 2 minutes. ⏱️";
  if (t.includes('ship') || t.includes('deliver')) return "We ship within 1-2 business days. Standard 5-7 days, Express 2-3 days. Free shipping over $50! 🚚";
  if (t.includes('discount') || t.includes('promo') || t.includes('code')) return "Use code WELCOME10 for 10% off your first order! 🎉";
  var fallbacks = [
    "Great question! Let me check that for you. One moment... 🔍",
    "Thanks for reaching out! Our team will get back to you shortly. 💬",
    "I'm on it! Anything else I can help with in the meantime?"
  ];
  return fallbacks[Math.floor(Math.random() * fallbacks.length)];
}

function imsgScroll() {
  var el = document.getElementById('imsg-msgs');
  requestAnimationFrame(function(){ el.scrollTop = el.scrollHeight; });
}
function imsgTime() {
  return new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}
function imsgKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); imsgSend(); }
}
function imsgResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}
function imsgToggleBtn() {
  document.getElementById('imsg-sbtn').disabled = !document.getElementById('imsg-inp').value.trim();
}

// Init brand color
(function(){
  var l = document.getElementById('imsg-launcher');
  l.style.background = 'linear-gradient(145deg,' + IMSG_CONFIG.brandColor + ',' + IMSG_CONFIG.accentColor + ')';
  l.style.boxShadow = '0 4px 24px ' + IMSG_CONFIG.brandColor + '88, 0 2px 8px rgba(0,0,0,0.3)';
  document.getElementById('imsg-av').style.background = 'linear-gradient(135deg,' + IMSG_CONFIG.brandColor + ',' + IMSG_CONFIG.accentColor + ')';
  document.getElementById('imsg-av').textContent = IMSG_CONFIG.agentAvatar;
  document.getElementById('imsg-hname').textContent = IMSG_CONFIG.agentName;
  document.querySelector('.imsg-send-btn').style.background = IMSG_CONFIG.brandColor;
  document.querySelector('.imsg-send-btn').style.boxShadow = '0 2px 10px ' + IMSG_CONFIG.brandColor + '66';
})();
</script>
<!-- ─── End iMessage Chat Widget ─────────────────────────────────── -->
